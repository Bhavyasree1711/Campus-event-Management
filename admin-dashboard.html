<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - College Event Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-primary" href="index.html">
                <i class="bi bi-shield-lock me-2"></i>Admin Panel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <button class="btn btn-outline-success btn-sm btn-animated" onclick="Export.toExcel()">
                            <i class="bi bi-file-earmark-excel me-1"></i> Export Data
                        </button>
                    </li>
                    <li class="nav-item dropdown" id="authLinks">
                        <a class="nav-link dropdown-toggle fw-bold text-primary" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-badge me-1"></i> <span id="userNameDisplay">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Logout</a></li>
                        </ul>
                    </li>
                    <li class="nav-item ms-3">
                        <button id="themeToggle" class="btn btn-outline-secondary rounded-circle px-2 py-1">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid px-4 py-4">
        
        <!-- Dashboard Stats -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card stat-card shadow-sm h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase fw-bold mb-2">Total Events</h6>
                            <h2 class="mb-0 fw-bold" id="totalEvents">0</h2>
                        </div>
                        <div class="bg-primary bg-opacity-10 p-3 rounded-circle text-primary">
                            <i class="bi bi-calendar-event fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card shadow-sm h-100" style="border-left-color: #198754;">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase fw-bold mb-2">Total Registrations</h6>
                            <h2 class="mb-0 fw-bold" id="totalRegistrations">0</h2>
                        </div>
                        <div class="bg-success bg-opacity-10 p-3 rounded-circle text-success">
                            <i class="bi bi-people fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3 d-flex align-items-center">
                <button class="btn btn-primary btn-lg w-100 h-100 fw-bold btn-animated shadow-sm d-flex justify-content-center align-items-center" data-bs-toggle="modal" data-bs-target="#createEventModal">
                    <i class="bi bi-plus-circle me-2 fs-4"></i> Create New Event
                </button>
            </div>
        </div>

        <hr class="my-4 text-muted">

        <!-- Manage Events -->
        <h4 class="fw-bold mb-4">Manage Events</h4>
        <div class="row" id="adminEventsList">
            <!-- Events injected here by admin.js -->
        </div>

    </main>

    <!-- Create/Edit Event Modal -->
    <div class="modal fade" id="createEventModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2 text-primary"></i> Event Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="eventForm">
                    <div class="modal-body">
                        <input type="hidden" id="eventId">
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Event Name</label>
                                <input type="text" class="form-control" id="eventTitle" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Category</label>
                                <select class="form-select" id="eventCategory" required>
                                    <option value="" disabled selected>Select Category</option>
                                    <option value="Technical">Technical</option>
                                    <option value="Cultural">Cultural</option>
                                    <option value="Sports">Sports</option>
                                    <option value="Workshop">Workshop</option>
                                    <option value="Seminar">Seminar</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea class="form-control" id="eventDescription" rows="3" required></textarea>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Venue</label>
                                <input type="text" class="form-control" id="eventVenue" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" class="form-control" id="eventDate" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Time</label>
                                <input type="time" class="form-control" id="eventTime" required>
                            </div>
                        </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">Max Participants</label>
                                    <input type="number" class="form-control" id="eventMax" min="1" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">Poster Image URL (Optional)</label>
                                    <input type="url" class="form-control" id="eventPoster" placeholder="https://...">
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            <h6 class="fw-bold mb-3 text-primary">Coordinator Details</h6>
                            
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold small">Coordinator Name</label>
                                    <input type="text" class="form-control" id="eventCoordName" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold small">Contact Number</label>
                                    <input type="tel" class="form-control" id="eventCoordPhone" pattern="[0-9]{10}" placeholder="10-digit mobile" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold small">Department</label>
                                    <select class="form-select" id="eventCoordDept" required>
                                        <option value="" disabled selected>Select Dept</option>
                                        <option value="Computer Science">Computer Science</option>
                                        <option value="Information Technology">Information Technology</option>
                                        <option value="Electronics">Electronics</option>
                                        <option value="Mechanical">Mechanical</option>
                                        <option value="Civil">Civil</option>
                                    </select>
                                </div>
                            </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary btn-animated px-4 fw-bold">Save Event</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/export.js"></script>
</body>
</html>
