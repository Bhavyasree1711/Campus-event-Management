<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Event - College Event Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top py-2">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">
                <i class="bi bi-calendar-event me-2"></i>Student Portal
            </a>
            <div class="d-flex ms-auto align-items-center">
                <a href="student-dashboard.html" class="btn btn-outline-primary btn-sm me-3"><i class="bi bi-arrow-left me-1"></i> Back to Dashboard</a>
                <button id="themeToggle" class="btn btn-outline-secondary rounded-circle px-2 py-1">
                    <i class="bi bi-moon-fill"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 overflow-hidden">
                    <div class="row g-0">
                        <div class="col-md-5 d-none d-md-block bg-light border-end">
                            <img src="" id="displayEventPoster" class="img-fluid h-100 object-fit-cover" alt="Event Poster" onerror="this.src='https://images.unsplash.com/photo-1523580494863-6f3031224c94?auto=format&fit=crop&w=400&q=80'">
                        </div>
                        <div class="col-md-7 p-4 p-md-5">
                            
                            <div class="mb-4">
                                <h3 class="fw-bold mb-1" id="displayEventTitle">Loading Event...</h3>
                                <p class="text-muted small mb-2">
                                    <i class="bi bi-calendar-check me-1"></i> <span id="displayEventDate"></span><br>
                                    <i class="bi bi-geo-alt me-1"></i> <span id="displayEventVenue"></span>
                                </p>
                                <div class="bg-light p-3 rounded border">
                                    <h6 class="fw-bold mb-2 small text-primary"><i class="bi bi-headset me-1"></i>Event Coordinator</h6>
                                    <p class="mb-0 small">
                                        <span id="displayCoordName" class="fw-bold"></span> (<span id="displayCoordDept"></span>)<br>
                                        <i class="bi bi-telephone-fill text-muted me-1 mt-1"></i> <a href="#" id="displayCoordPhoneLink" class="text-decoration-none"><span id="displayCoordPhone"></span></a>
                                    </p>
                                </div>
                            </div>

                            <hr class="mb-4">

                            <div id="regError" class="alert alert-danger d-none" role="alert"></div>

                            <form id="registrationForm">
                                <h5 class="fw-bold mb-3">Participant Details</h5>
                                
                                <div class="row mb-3">
                                    <div class="col-sm-6">
                                        <label class="form-label fw-bold small">Roll Number</label>
                                        <input type="text" class="form-control" id="regRollNumber" readonly required>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="form-label fw-bold small">Full Name</label>
                                        <input type="text" class="form-control" id="regName" placeholder="John Doe" required>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-sm-6">
                                        <label class="form-label fw-bold small">Department</label>
                                        <select class="form-select" id="regDepartment" required>
                                            <option value="" disabled selected>Select Dept</option>
                                            <option value="Computer Science">Computer Science</option>
                                            <option value="Information Technology">Information Technology</option>
                                            <option value="Electronics">Electronics</option>
                                            <option value="Mechanical">Mechanical</option>
                                            <option value="Civil">Civil</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="form-label fw-bold small">Year</label>
                                        <select class="form-select" id="regYear" required>
                                            <option value="" disabled selected>Select Year</option>
                                            <option value="1st Year">1st Year</option>
                                            <option value="2nd Year">2nd Year</option>
                                            <option value="3rd Year">3rd Year</option>
                                            <option value="4th Year">4th Year</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row mb-4">
                                    <div class="col-sm-6">
                                        <label class="form-label fw-bold small">Email Address</label>
                                        <input type="email" class="form-control" id="regEmail" placeholder="student@college.edu" required>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="form-label fw-bold small">Phone Number</label>
                                        <input type="tel" class="form-control" id="regPhone" pattern="[0-9]{10}" placeholder="10-digit mobile" required>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 btn-animated fw-bold py-2">
                                    Confirm Registration
                                </button>
                            </form>

                            <!-- Success State -->
                            <div id="successCard" class="text-center d-none py-4">
                                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                                <h3 class="mt-3 fw-bold">Registration Successful!</h3>
                                <p class="text-muted">Your seat has been reserved. You can view this in your dashboard under "My Registrations".</p>
                                <a href="student-dashboard.html" class="btn btn-outline-primary mt-3 btn-animated">Go to Dashboard</a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
